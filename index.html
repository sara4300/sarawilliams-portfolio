<!DOCTYPE html>
<!--
  entry.html — Site entry screen (landing page)
  This is the intended entry point for the site.
  GitHub Pages: set this as the root index or rename to index.html and rename the current index.html to portfolio.html.
  Returning visitors are detected via sessionStorage key "introSeen" and redirected straight to home.html.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sara Williams — UX Designer</title>
  <meta name="description" content="Senior UX/UI Designer at Deloitte specializing in healthcare enrollment platforms, Medicaid compliance tools, and government portals.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080e14;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Page wrapper — fades out on exit */
    #entry-page {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080e14;
      opacity: 1;
      transition: opacity 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #entry-page.fade-out { opacity: 0; pointer-events: none; }

    /* Canvas glow — drawn via JS */
    #glow-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Content column */
    .entry-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 32px;
      max-width: 760px;
      width: 100%;
    }

    /* Text lines */
    .entry-lines {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 56px;
      width: 100%;
    }

    .line-1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
      min-height: 1.3em;
    }

    .line-2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 400;
      font-style: italic;
      color: #c8d4e0;
      line-height: 1.3;
      min-height: 1.3em;
    }

    .line-3 {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-size: clamp(12px, 1.4vw, 14px);
      font-weight: 300;
      color: #8a9db0;
      line-height: 1.7;
      margin-top: 4px;
      min-height: 1.7em;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: rgba(255, 255, 255, 0.5);
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 800ms step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* CTA area — hidden until typewriter finishes */
    .entry-cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 700ms cubic-bezier(0.4, 0, 0.2, 1), transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .entry-cta.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .btn-see-work {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #ffffff;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 14px 28px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      transition: border-color 240ms ease, background 240ms ease;
    }

    .btn-see-work:hover {
      border-color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.04);
    }


@media (prefers-reduced-motion: reduce) {
      .entry-cta { opacity: 1; transform: none; transition: none; }
      .cursor { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="entry-page">
    <canvas id="glow-canvas" aria-hidden="true"></canvas>
    <div class="entry-inner">

      <div class="entry-lines">
        <p class="line-1" id="line1" aria-live="polite"></p>
        <p class="line-2" id="line2"></p>
        <p class="line-3" id="line3"></p>
      </div>

      <div class="entry-cta" id="cta" aria-hidden="true">
        <a href="home.html" class="btn-see-work" id="btn-work">View my work →</a>
      </div>

    </div>

    <!-- Ambient signature -->
    <p aria-hidden="true" style="position:fixed; bottom:28px; left:32px; font-family:'DM Sans','Helvetica Neue',sans-serif; font-size:13px; font-weight:400; letter-spacing:0.18em; text-transform:uppercase; color:#c8d4e0; opacity:0.78; z-index:1; pointer-events:none; user-select:none;">Sara Williams</p>

  </div>

  <script>
    // Entry screen always plays on direct navigation

    // ===== Canvas glow + particles =====
    (function () {
      const canvas = document.getElementById('glow-canvas');
      const ctx = canvas.getContext('2d');
      let start = null;

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize, { passive: true });

      // ── Particle system ──
      const PARTICLE_COUNT = 55;
      const particles = [];

      function rand(min, max) { return min + Math.random() * (max - min); }

      // Each particle orbits loosely around the glow center
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const angle  = rand(0, Math.PI * 2);
        const orbit  = rand(120, 380);   // distance from center
        const speed  = rand(0.04, 0.14); // orbit angular speed (rad/s)
        const drift  = rand(-0.18, 0.18); // slow radial drift
        const radius = rand(0.8, 2.2);   // dot size
        const sparkleOffset = rand(0, Math.PI * 2); // phase offset for sparkle
        const sparkleSpeed  = rand(1.2, 3.5);       // sparkle frequency (Hz)
        // Color: mostly white, ~30% blue-tinted
        const blue = Math.random() < 0.3;
        particles.push({ angle, orbit, speed, drift, radius, sparkleOffset, sparkleSpeed, blue });
      }

      function drawFrame(ts) {
        if (!start) start = ts;
        const elapsed = (ts - start) / 1000;

        const cx = canvas.width  / 2;
        const cy = canvas.height / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // ── Outer glow — 6s cycle ──
        const alphaOuter = 0.05 + (Math.sin(elapsed * (Math.PI * 2 / 6)) * 0.5 + 0.5) * (0.28 - 0.05);
        const outerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 350);
        outerGrad.addColorStop(0, `rgba(30,60,90,${alphaOuter})`);
        outerGrad.addColorStop(1, 'rgba(30,60,90,0)');
        ctx.fillStyle = outerGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ── Inner glow — 4s cycle, 1s offset ──
        const alphaInner = 0.08 + (Math.sin((elapsed - 1) * (Math.PI * 2 / 4)) * 0.5 + 0.5) * (0.38 - 0.08);
        const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
        innerGrad.addColorStop(0, `rgba(43,80,110,${alphaInner})`);
        innerGrad.addColorStop(1, 'rgba(43,80,110,0)');
        ctx.fillStyle = innerGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ── Particles ──
        for (const p of particles) {
          // Advance angle and gently drift orbit radius
          p.angle += p.speed * (1 / 60);
          p.orbit += p.drift * (1 / 60);
          // Softly clamp orbit so particles stay in the glow zone
          if (p.orbit < 90)  { p.orbit = 90;  p.drift =  Math.abs(p.drift); }
          if (p.orbit > 400) { p.orbit = 400; p.drift = -Math.abs(p.drift); }

          const x = cx + Math.cos(p.angle) * p.orbit;
          const y = cy + Math.sin(p.angle) * p.orbit;

          // Sparkle: opacity pulses between dim and bright
          const sparkle = Math.sin(elapsed * p.sparkleSpeed * Math.PI * 2 + p.sparkleOffset);
          const alpha = 0.06 + (sparkle * 0.5 + 0.5) * 0.28; // 0.06 → 0.34

          // Occasional bright spike — makes it feel like it's twinkling
          const spike = alpha > 0.28 ? p.radius * 1.5 : p.radius;

          if (p.blue) {
            ctx.fillStyle = `rgba(100,180,255,${alpha * 0.85})`;
          } else {
            ctx.fillStyle = `rgba(220,235,255,${alpha})`;
          }

          ctx.beginPath();
          ctx.arc(x, y, spike, 0, Math.PI * 2);
          ctx.fill();

          // Soft halo on brighter particles
          if (alpha > 0.22) {
            const haloA = (alpha - 0.22) * 0.12;
            const color = p.blue ? `rgba(100,180,255,${haloA})` : `rgba(200,225,255,${haloA})`;
            const halo = ctx.createRadialGradient(x, y, 0, x, y, spike * 4);
            halo.addColorStop(0, color);
            halo.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(x, y, spike * 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        requestAnimationFrame(drawFrame);
      }

      requestAnimationFrame(drawFrame);
    })();

    // ===== Typewriter =====
    const LINE1 = 'Good design doesn\u2019t simplify complexity.';
    const LINE2 = 'It makes complexity navigable.';
    const LINE3 = 'So who\u2019s designing for the systems that matter most?';

    const el1 = document.getElementById('line1');
    const el2 = document.getElementById('line2');
    const el3 = document.getElementById('line3');
    const cta = document.getElementById('cta');

    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.setAttribute('aria-hidden', 'true');

    function typeText(el, text, speed) {
      return new Promise(resolve => {
        el.appendChild(cursor);
        let i = 0;
        const tick = () => {
          if (i < text.length) {
            el.insertBefore(document.createTextNode(text[i]), cursor);
            i++;
            setTimeout(tick, speed);
          } else {
            resolve();
          }
        };
        tick();
      });
    }

    function pause(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function navigate() {
      sessionStorage.setItem('introSeen', 'true');
      document.getElementById('entry-page').classList.add('fade-out');
      setTimeout(() => { window.location.href = 'home.html'; }, 620);
    }

    document.getElementById('btn-work').addEventListener('click', e => {
      e.preventDefault();
      navigate();
    });

    (async () => {
      await pause(300);
      await typeText(el1, LINE1, 38);
      await pause(600);
      cursor.remove();
      el2.appendChild(cursor);
      await typeText(el2, LINE2, 38);
      await pause(600);
      cursor.remove();
      el3.appendChild(cursor);
      await typeText(el3, LINE3, 28);
      await pause(800);
      cursor.remove();

      cta.removeAttribute('aria-hidden');
      cta.classList.add('visible');
    })();
  </script>

</body>
</html>
